<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians - Scholarship Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-graduation-cap"></i> Scholarship Platform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="schools.html"><i class="fas fa-school"></i> Schools</a></li>
                    <li class="nav-item"><a class="nav-link" href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
                    <li class="nav-item"><a class="nav-link active" href="guardians.html"><i class="fas fa-users"></i> Guardians</a></li>
                    <li class="nav-item"><a class="nav-link" href="agents.html"><i class="fas fa-user-tie"></i> Agents</a></li>
                    <li class="nav-item"><a class="nav-link" href="scholarships.html"><i class="fas fa-award"></i> Scholarships</a></li>
                    <li class="nav-item"><a class="nav-link" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a></li>
                    <li class="nav-item"><a class="nav-link" href="donate.html"><i class="fas fa-donate"></i> Donate</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2><i class="fas fa-users"></i> Guardians</h2>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-primary" onclick="showCreateModal()">
                    <i class="fas fa-plus"></i> Add Guardian
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Relationship</th>
                        </tr>
                    </thead>
                    <tbody id="guardiansTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Guardian</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Student ID</label>
                        <input type="number" class="form-control" id="guardianStudentId" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="guardianFirstName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="guardianLastName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="guardianEmail">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="guardianPhone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Relationship</label>
                        <input type="text" class="form-control" id="guardianRelationship" placeholder="e.g., Parent, Uncle">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createGuardian()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadGuardians() {
            const response = await fetch('/guardians');
            const guardians = await response.json();
            const tbody = document.getElementById('guardiansTable');
            tbody.innerHTML = guardians.map(g => `
                <tr>
                    <td>${g.id}</td>
                    <td>${g.first_name} ${g.last_name}</td>
                    <td>Student #${g.student_id}</td>
                    <td>${g.email || '-'}</td>
                    <td>${g.phone || '-'}</td>
                    <td>${g.relationship || '-'}</td>
                </tr>
            `).join('');
        }

        function showCreateModal() {
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        async function createGuardian() {
            const data = {
                student_id: parseInt(document.getElementById('guardianStudentId').value),
                first_name: document.getElementById('guardianFirstName').value,
                last_name: document.getElementById('guardianLastName').value,
                email: document.getElementById('guardianEmail').value,
                phone: document.getElementById('guardianPhone').value,
                relationship: document.getElementById('guardianRelationship').value
            };
            await fetch('/guardians', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
            loadGuardians();
        }

        loadGuardians();
    </script>
</body>
</html>
