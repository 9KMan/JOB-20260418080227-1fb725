<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement - ERP System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">ERP System</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="procurement.html"><i class="fas fa-shopping-cart"></i> Procurement</a></li>
                    <li class="nav-item"><a class="nav-link" href="goods_receiving.html"><i class="fas fa-truck"></i> Goods Receiving</a></li>
                    <li class="nav-item"><a class="nav-link" href="production.html"><i class="fas fa-industry"></i> Production</a></li>
                    <li class="nav-item"><a class="nav-link" href="packaging.html"><i class="fas fa-box"></i> Packaging</a></li>
                    <li class="nav-item"><a class="nav-link" href="sales.html"><i class="fas fa-chart-line"></i> Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="financial.html"><i class="fas fa-dollar-sign"></i> Financial</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Procurement Management</h2>
        
        <ul class="nav nav-tabs mt-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#suppliers">Suppliers</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#purchase-orders">Purchase Orders</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#requisitions">Requisitions</button></li>
        </ul>

        <div class="tab-content mt-3">
            <div class="tab-pane fade show active" id="suppliers">
                <div class="card">
                    <div class="card-header">Suppliers</div>
                    <div class="card-body">
                        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#supplierModal">Add Supplier</button>
                        <div class="table-responsive">
                            <table class="table table-striped" id="suppliersTable">
                                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="purchase-orders">
                <div class="card">
                    <div class="card-header">Purchase Orders</div>
                    <div class="card-body">
                        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#poModal">Create PO</button>
                        <div class="table-responsive">
                            <table class="table table-striped" id="poTable">
                                <thead><tr><th>Order #</th><th>Supplier</th><th>Date</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="requisitions">
                <div class="card">
                    <div class="card-header">Purchase Requisitions</div>
                    <div class="card-body">
                        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#prModal">Create Requisition</button>
                        <div class="table-responsive">
                            <table class="table table-striped" id="prTable">
                                <thead><tr><th>Request #</th><th>Department</th><th>Requested By</th><th>Date</th><th>Status</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/procurement.js"></script>
</body>
</html>
