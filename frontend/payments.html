<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Scholarship Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-graduation-cap"></i> Scholarship Platform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="schools.html"><i class="fas fa-school"></i> Schools</a></li>
                    <li class="nav-item"><a class="nav-link" href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
                    <li class="nav-item"><a class="nav-link" href="guardians.html"><i class="fas fa-users"></i> Guardians</a></li>
                    <li class="nav-item"><a class="nav-link" href="agents.html"><i class="fas fa-user-tie"></i> Agents</a></li>
                    <li class="nav-item"><a class="nav-link" href="scholarships.html"><i class="fas fa-award"></i> Scholarships</a></li>
                    <li class="nav-item"><a class="nav-link active" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a></li>
                    <li class="nav-item"><a class="nav-link" href="donate.html"><i class="fas fa-donate"></i> Donate</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="fas fa-credit-card"></i> Payments</h2>

        <div class="card mt-3">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <select class="form-select" id="statusFilter" onchange="loadPayments()">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="verified">Verified</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                </div>

                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Provider</th>
                            <th>Reference</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTable">
                        <tr><td colspan="7" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadPayments() {
            const status = document.getElementById('statusFilter').value;
            let url = '/payments';
            if (status) url += `?status=${status}`;

            const response = await fetch(url);
            const payments = await response.json();
            const tbody = document.getElementById('paymentsTable');

            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No payments found</td></tr>';
                return;
            }

            tbody.innerHTML = payments.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td><span class="badge bg-secondary">${p.payment_provider || 'N/A'}</span></td>
                    <td><code>${p.provider_reference || '-'}</code></td>
                    <td>${p.currency || 'USD'} ${parseFloat(p.amount).toFixed(2)}</td>
                    <td><span class="badge bg-${getStatusColor(p.status)}">${p.status}</span></td>
                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                    <td>
                        ${p.status === 'verified' ? `<button class="btn btn-sm btn-info" onclick="downloadReceipt(${p.id})"><i class="fas fa-file-pdf"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = { pending: 'warning', verified: 'success', failed: 'danger' };
            return colors[status] || 'secondary';
        }

        async function downloadReceipt(paymentId) {
            const response = await fetch(`/payments/receipt/${paymentId}`, {
                headers: { 'Accept': 'application/json' }
            });
            const result = await response.json();
            if (result.receipt) {
                const blob = new Blob([new Uint8Array(result.receipt.match(/.{1,2}/g).map(b => parseInt(b, 16)))], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `receipt-${paymentId}.pdf`;
                a.click();
            }
        }

        loadPayments();
    </script>
</body>
</html>
