<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schools - Scholarship Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-graduation-cap"></i> Scholarship Platform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schools.html"><i class="fas fa-school"></i> Schools</a></li>
                    <li class="nav-item"><a class="nav-link" href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
                    <li class="nav-item"><a class="nav-link" href="guardians.html"><i class="fas fa-users"></i> Guardians</a></li>
                    <li class="nav-item"><a class="nav-link" href="agents.html"><i class="fas fa-user-tie"></i> Agents</a></li>
                    <li class="nav-item"><a class="nav-link" href="scholarships.html"><i class="fas fa-award"></i> Scholarships</a></li>
                    <li class="nav-item"><a class="nav-link" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a></li>
                    <li class="nav-item"><a class="nav-link" href="donate.html"><i class="fas fa-donate"></i> Donate</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2><i class="fas fa-school"></i> Schools</h2>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-primary" onclick="showCreateModal()">
                    <i class="fas fa-plus"></i> Add School
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Verified At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="schoolsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add School</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">School Name</label>
                        <input type="text" class="form-control" id="schoolName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="schoolEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="schoolAddress" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createSchool()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadSchools() {
            const response = await fetch('/schools');
            const schools = await response.json();
            const tbody = document.getElementById('schoolsTable');
            tbody.innerHTML = schools.map(school => `
                <tr>
                    <td>${school.id}</td>
                    <td>${school.name}</td>
                    <td>${school.email || '-'}</td>
                    <td><span class="badge bg-${school.verification_status === 'verified' ? 'success' : 'warning'}">${school.verification_status}</span></td>
                    <td>${school.verified_at ? new Date(school.verified_at).toLocaleDateString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="verifySchool(${school.id})"><i class="fas fa-check"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateModal() {
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        async function createSchool() {
            const data = {
                name: document.getElementById('schoolName').value,
                email: document.getElementById('schoolEmail').value,
                address: document.getElementById('schoolAddress').value
            };
            await fetch('/schools', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
            loadSchools();
        }

        async function verifySchool(id) {
            await fetch(`/schools/${id}/verify`, { method: 'POST' });
            loadSchools();
        }

        loadSchools();
    </script>
</body>
</html>
